# Render Blueprint for the ZenkaiTV web app (persistent Node server).
# Deploy: push this repo to Git, then on render.com "New > Blueprint".
#
# IMPORTANT: set TIOANIME_API below to the URL of your deployed scraper
# service (the zenkaitv-scraper Render service). Until then, TioAnime /
# AnimeAV1 sources are unavailable online but everything else works.
services:
  - type: web
    name: zenkaitv
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node animetv-local.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      # Point this at your deployed Python scraper service:
      - key: TIOANIME_API
        value: "https://zenkaitv-scraper.onrender.com"
      # Anime1v is an optional local-only addon; never auto-start it on a host.
      - key: ANIME1V_AUTO_START
        value: "false"
