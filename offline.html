<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <meta name="theme-color" content="#0D1B2A">
    <title>ZenkaiTV - Website Down</title>
    <link rel="icon" type="image/png" href="logo-mark.png?v=207">
    <style>
      :root {
        color-scheme: dark;
        --bg: #080a13;
        --panel: rgba(18, 19, 38, 0.72);
        --text: #f6f3ff;
        --muted: #aba6c3;
        --cyan: #00d2ff;
        --violet: #8a5cff;
        --gold: #f2bb46;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 210, 255, 0.18), transparent 18rem),
          radial-gradient(circle at 80% 12%, rgba(138, 92, 255, 0.24), transparent 22rem),
          linear-gradient(135deg, #080a13 0%, #101327 52%, #070916 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 3rem 3rem;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), transparent);
        pointer-events: none;
      }

      .down-card {
        position: relative;
        width: min(58rem, calc(100vw - 2rem));
        min-height: min(34rem, calc(100vh - 2rem));
        display: grid;
        grid-template-columns: minmax(18rem, 0.92fr) minmax(22rem, 1.08fr);
        align-items: center;
        gap: clamp(1.5rem, 4vw, 4rem);
        padding: clamp(1.4rem, 4vw, 3.6rem);
        border: 0.08rem solid rgba(255, 255, 255, 0.12);
        border-radius: 1.8rem;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.035)),
          var(--panel);
        box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(22px) saturate(1.12);
        isolation: isolate;
      }

      .down-card::after {
        content: "";
        position: absolute;
        inset: 1rem;
        z-index: -1;
        border-radius: 1.35rem;
        background: linear-gradient(120deg, transparent 0 28%, rgba(0, 210, 255, 0.14) 45%, transparent 62% 100%);
        transform: translateX(-35%);
        animation: scan 3.4s ease-in-out infinite;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.85rem;
        margin-bottom: 2rem;
        color: var(--muted);
        font-weight: 900;
        letter-spacing: 0.14em;
      }

      .mark {
        position: relative;
        width: 4.3rem;
        height: 4.3rem;
        display: grid;
        place-items: center;
        border-radius: 1.1rem;
        background: linear-gradient(135deg, var(--violet), var(--cyan));
        box-shadow: 0 0 2.4rem rgba(0, 210, 255, 0.24);
      }

      .screen {
        width: 2.7rem;
        height: 2rem;
        border: 0.18rem solid rgba(255, 255, 255, 0.92);
        border-radius: 0.28rem;
        background: rgba(6, 8, 18, 0.66);
      }

      .screen::before {
        content: "";
        position: absolute;
        left: 1.78rem;
        top: 1.53rem;
        width: 0;
        height: 0;
        border-top: 0.42rem solid transparent;
        border-bottom: 0.42rem solid transparent;
        border-left: 0.66rem solid #83ffdf;
        filter: drop-shadow(0 0 0.55rem rgba(131, 255, 223, 0.82));
      }

      .spark {
        position: absolute;
        right: 0.42rem;
        top: 0.45rem;
        width: 0.58rem;
        height: 0.58rem;
        border-radius: 50%;
        background: var(--gold);
        animation: blink 1.1s steps(2, end) infinite;
      }

      h1 {
        max-width: 12ch;
        margin: 0;
        font-size: clamp(3rem, 7vw, 6.4rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      p {
        max-width: 38rem;
        margin: 1rem 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.8vw, 1.35rem);
        font-weight: 700;
        line-height: 1.5;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin-top: 2rem;
        padding: 0.75rem 1rem;
        border: 0.08rem solid rgba(255, 255, 255, 0.12);
        border-radius: 999rem;
        background: rgba(0, 0, 0, 0.24);
        color: rgba(246, 243, 255, 0.86);
        font-weight: 900;
      }

      .live-dot {
        width: 0.8rem;
        height: 0.8rem;
        border-radius: 50%;
        background: var(--cyan);
        box-shadow: 0 0 0 0.45rem rgba(0, 210, 255, 0.12);
        animation: pulse 1.2s ease-in-out infinite;
      }

      .anime-rig {
        position: relative;
        height: clamp(20rem, 46vw, 30rem);
        display: grid;
        place-items: center;
      }

      .moon {
        position: absolute;
        width: 13rem;
        height: 13rem;
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.9), transparent 0.45rem),
          radial-gradient(circle at 65% 58%, rgba(255, 255, 255, 0.55), transparent 0.75rem),
          linear-gradient(135deg, rgba(242, 187, 70, 0.92), rgba(255, 238, 179, 0.82));
        filter: drop-shadow(0 0 2.8rem rgba(242, 187, 70, 0.22));
        opacity: 0.95;
      }

      .antenna {
        position: absolute;
        bottom: 3.5rem;
        width: 15rem;
        height: 12rem;
        border-bottom: 0.35rem solid rgba(246, 243, 255, 0.78);
        border-left: 0.35rem solid rgba(246, 243, 255, 0.78);
        transform: skewX(-10deg);
      }

      .antenna::before,
      .antenna::after {
        content: "";
        position: absolute;
        left: 2.2rem;
        right: -1rem;
        height: 0.22rem;
        background: rgba(246, 243, 255, 0.6);
        transform: rotate(-18deg);
      }

      .antenna::before {
        top: 2rem;
      }

      .antenna::after {
        top: 5.1rem;
      }

      .mascot {
        position: absolute;
        bottom: 5.2rem;
        left: 50%;
        width: 6.8rem;
        height: 9rem;
        transform: translateX(-50%);
        animation: float 2.6s ease-in-out infinite;
      }

      .head {
        position: absolute;
        top: 0;
        left: 1.35rem;
        width: 4.2rem;
        height: 4.2rem;
        border-radius: 46% 46% 52% 52%;
        background: #ffe6c7;
        box-shadow: inset 0 -0.32rem rgba(109, 72, 76, 0.12);
      }

      .hair {
        position: absolute;
        left: 0.92rem;
        top: -0.32rem;
        width: 4.95rem;
        height: 3.15rem;
        border-radius: 54% 54% 40% 40%;
        background: linear-gradient(135deg, #665cff, #24183e);
      }

      .hair::before,
      .hair::after {
        content: "";
        position: absolute;
        top: 1.8rem;
        width: 1.3rem;
        height: 3.6rem;
        border-radius: 999rem;
        background: #24183e;
      }

      .hair::before {
        left: -0.35rem;
        transform: rotate(11deg);
      }

      .hair::after {
        right: -0.4rem;
        transform: rotate(-12deg);
      }

      .eye {
        position: absolute;
        top: 2.25rem;
        width: 0.48rem;
        height: 0.62rem;
        border-radius: 50%;
        background: #141426;
      }

      .eye.left {
        left: 2.35rem;
      }

      .eye.right {
        left: 4rem;
      }

      .body {
        position: absolute;
        left: 1.75rem;
        top: 4.05rem;
        width: 3.45rem;
        height: 4.25rem;
        border-radius: 1rem 1rem 1.4rem 1.4rem;
        background: linear-gradient(135deg, var(--cyan), var(--violet));
        box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.24);
      }

      .wrench {
        position: absolute;
        right: -0.1rem;
        top: 4.8rem;
        width: 4.8rem;
        height: 0.45rem;
        border-radius: 999rem;
        background: rgba(246, 243, 255, 0.88);
        transform-origin: left center;
        animation: wrench 1.6s ease-in-out infinite;
      }

      .wrench::after {
        content: "";
        position: absolute;
        right: -0.45rem;
        top: -0.38rem;
        width: 1.1rem;
        height: 1.1rem;
        border: 0.26rem solid rgba(246, 243, 255, 0.88);
        border-left-color: transparent;
        border-radius: 50%;
      }

      .signal {
        position: absolute;
        top: 4.3rem;
        right: 3.1rem;
        width: 3rem;
        height: 3rem;
        border: 0.18rem solid transparent;
        border-top-color: var(--cyan);
        border-right-color: var(--cyan);
        border-radius: 50%;
        opacity: 0;
        animation: signal 1.5s ease-out infinite;
      }

      .signal.two {
        animation-delay: 0.42s;
      }

      @keyframes scan {
        0%,
        100% {
          transform: translateX(-45%);
          opacity: 0.15;
        }
        50% {
          transform: translateX(45%);
          opacity: 0.7;
        }
      }

      @keyframes blink {
        50% {
          opacity: 0.35;
        }
      }

      @keyframes pulse {
        50% {
          transform: scale(1.18);
          box-shadow: 0 0 0 0.7rem rgba(0, 210, 255, 0.04);
        }
      }

      @keyframes float {
        50% {
          transform: translate(-50%, -0.65rem);
        }
      }

      @keyframes wrench {
        50% {
          transform: rotate(-16deg);
        }
      }

      @keyframes signal {
        0% {
          opacity: 0.8;
          transform: scale(0.35) rotate(-20deg);
        }
        100% {
          opacity: 0;
          transform: scale(1.5) rotate(-20deg);
        }
      }

      @media (max-width: 780px) {
        .down-card {
          grid-template-columns: 1fr;
          min-height: calc(100vh - 1rem);
          border-radius: 1.2rem;
        }

        .anime-rig {
          order: -1;
          height: 18rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="down-card" role="main">
      <section>
        <div class="brand" aria-label="ZenkaiTV">
          <span class="mark" aria-hidden="true">
            <span class="screen"></span>
            <span class="spark"></span>
          </span>
          ZenkaiTV
        </div>
        <h1>Website Down</h1>
        <p>We are working on it. The anime signal is being repaired, and ZenkaiTV will be back as soon as the local server is ready.</p>
        <div class="status-pill">
          <span class="live-dot" aria-hidden="true"></span>
          Maintenance broadcast active
        </div>
      </section>
      <section class="anime-rig" aria-hidden="true">
        <div class="moon"></div>
        <div class="antenna"></div>
        <div class="signal"></div>
        <div class="signal two"></div>
        <div class="mascot">
          <div class="hair"></div>
          <div class="head"></div>
          <span class="eye left"></span>
          <span class="eye right"></span>
          <div class="body"></div>
          <div class="wrench"></div>
        </div>
      </section>
    </main>
  </body>
</html>
