<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">AnimeTV</title>
  <desc id="desc">A dark cinematic AnimeTV banner with cyan, violet, and gold accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070914"/>
      <stop offset="0.48" stop-color="#11162a"/>
      <stop offset="1" stop-color="#050710"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d2ff"/>
      <stop offset="0.52" stop-color="#8a5cff"/>
