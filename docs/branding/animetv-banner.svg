    <rect x="28" y="31" width="108" height="78" rx="10" fill="#101528" stroke="#f7f7ff" stroke-width="7"/>
    <path d="M72 55 L72 87 L101 71 Z" fill="#40dfc2"/>
    <path d="M42 126 H122" stroke="#f7f7ff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="137" cy="31" r="10" fill="#f2bb46"/>
