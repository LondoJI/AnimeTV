  </defs>
  <rect width="1280" height="420" rx="36" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="36" fill="url(#glowA)"/>
  <rect width="1280" height="420" rx="36" fill="url(#glowB)"/>
  <path d="M0 320 C180 250 300 385 500 314 C760 222 895 230 1280 142 L1280 420 L0 420 Z" fill="#050710" opacity="0.68"/>
