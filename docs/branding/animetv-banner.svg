      <stop offset="1" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="64%" r="60%">
      <stop offset="0" stop-color="#8a5cff" stop-opacity="0.44"/>
